name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  # Opt-in to Node 24 to clear the deprecation warnings in your logs
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Security Audit
        # We use continue-on-error so that vulnerabilities don't stop the test suite
        continue-on-error: true
        run: |
          npm audit --omit=dev --audit-level=moderate || true
          npm audit --json > audit-report.json || true

      - name: Upload Audit Report
        # Only upload if the file was actually created
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-report
          path: audit-report.json
          if-no-files-found: ignore

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Playwright-BDD Tests
        # This will now reach this step because Audit won't kill the process
        run: npx playwright test

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore
